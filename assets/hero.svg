<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05060d"/>
      <stop offset="0.7" stop-color="#0a0c1d"/>
      <stop offset="1" stop-color="#16102e"/>
    </linearGradient>
    <linearGradient id="nameGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="300" y2="0" spreadMethod="repeat">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.35" stop-color="#a78bfa"/>
      <stop offset="0.7" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#22d3ee"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0 0; 300 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.6" stop-color="#f97316"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="horizonGlow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="meteor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="blurBig" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="blurSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="aboveHorizon">
      <rect x="0" y="0" width="900" height="292"/>
    </clipPath>
    <mask id="sunStripes">
      <rect x="330" y="220" width="240" height="80" fill="white"/>
      <rect x="330" y="258" width="240" height="2.5" fill="black"/>
      <rect x="330" y="268" width="240" height="3.5" fill="black"/>
      <rect x="330" y="278" width="240" height="4.5" fill="black"/>
      <rect x="330" y="287" width="240" height="5" fill="black"/>
    </mask>
    <mask id="typeMask">
      <rect x="260" y="186" width="0" height="34" fill="white">
        <animate attributeName="width" calcMode="discrete" values="0;20;40;60;80;100;120;140;160;180;200;220;240;260;280;300;320;340;360;385" begin="1.2s" dur="2s" fill="freeze"/>
      </rect>
    </mask>
  </defs>

  <rect width="900" height="420" fill="url(#bg)"/>

  <!-- starfield -->
  <style>
    .st { fill:#dbeafe; }
    .tw1 { animation: tw 2.6s ease-in-out infinite; }
    .tw2 { animation: tw 3.8s ease-in-out infinite; animation-delay: -1.2s; }
    .tw3 { animation: tw 5s ease-in-out infinite; animation-delay: -2.4s; }
    @keyframes tw { 0%,100% { opacity:.12 } 50% { opacity:.95 } }
  </style>
  <g>
    <circle class="st tw1" cx="40" cy="44" r="1.4"/><circle class="st tw2" cx="118" cy="120" r="1"/>
    <circle class="st tw3" cx="172" cy="36" r="1.7"/><circle class="st tw1" cx="236" cy="88" r="1"/>
    <circle class="st tw2" cx="305" cy="30" r="1.3"/><circle class="st tw3" cx="356" cy="76" r="1"/>
    <circle class="st tw1" cx="430" cy="42" r="1.6"/><circle class="st tw2" cx="497" cy="24" r="1"/>
    <circle class="st tw3" cx="558" cy="64" r="1.4"/><circle class="st tw1" cx="626" cy="34" r="1"/>
    <circle class="st tw2" cx="690" cy="92" r="1.6"/><circle class="st tw3" cx="752" cy="40" r="1.1"/>
    <circle class="st tw1" cx="820" cy="70" r="1.4"/><circle class="st tw2" cx="868" cy="26" r="1"/>
    <circle class="st tw3" cx="72" cy="180" r="1.2"/><circle class="st tw1" cx="150" cy="226" r="1"/>
    <circle class="st tw2" cx="246" cy="170" r="1.5"/><circle class="st tw3" cx="338" cy="132" r="1"/>
    <circle class="st tw1" cx="566" cy="128" r="1.2"/><circle class="st tw2" cx="650" cy="172" r="1"/>
    <circle class="st tw3" cx="728" cy="140" r="1.5"/><circle class="st tw1" cx="806" cy="196" r="1.1"/>
    <circle class="st tw2" cx="858" cy="142" r="1.3"/><circle class="st tw3" cx="20" cy="120" r="1"/>
    <circle class="st tw1" cx="884" cy="222" r="1"/><circle class="st tw2" cx="404" cy="100" r="1"/>
    <circle class="st tw3" cx="520" cy="160" r="1"/><circle class="st tw1" cx="96" cy="74" r="1"/>
  </g>

  <!-- shooting stars -->
  <g opacity="0">
    <line x1="0" y1="0" x2="90" y2="28" stroke="url(#meteor)" stroke-width="2" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="-120 20; 1000 220; 1000 220" keyTimes="0;0.1;1" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.04;0.1;1" dur="9s" repeatCount="indefinite"/>
  </g>
  <g opacity="0">
    <line x1="0" y1="0" x2="70" y2="18" stroke="url(#meteor)" stroke-width="1.5" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="-100 90; 1000 280; 1000 280" keyTimes="0;0.08;1" dur="13s" begin="-5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.03;0.08;1" dur="13s" begin="-5s" repeatCount="indefinite"/>
  </g>

  <!-- synthwave sun -->
  <g clip-path="url(#aboveHorizon)">
    <circle cx="450" cy="312" r="85" fill="url(#sunGrad)" filter="url(#blurBig)" opacity="0.55">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="312" r="68" fill="url(#sunGrad)" mask="url(#sunStripes)" opacity="0.9"/>
  </g>

  <!-- horizon + perspective grid -->
  <rect x="0" y="230" width="900" height="62" fill="url(#horizonGlow)"/>
  <line x1="0" y1="292" x2="900" y2="292" stroke="#22d3ee" stroke-width="1.5" opacity="0.8" filter="url(#blurSoft)"/>
  <g stroke="#a78bfa" stroke-width="1" opacity="0.35">
    <line x1="450" y1="292" x2="-260" y2="420"/>
    <line x1="450" y1="292" x2="-60" y2="420"/>
    <line x1="450" y1="292" x2="90" y2="420"/>
    <line x1="450" y1="292" x2="210" y2="420"/>
    <line x1="450" y1="292" x2="310" y2="420"/>
    <line x1="450" y1="292" x2="400" y2="420"/>
    <line x1="450" y1="292" x2="500" y2="420"/>
    <line x1="450" y1="292" x2="590" y2="420"/>
    <line x1="450" y1="292" x2="690" y2="420"/>
    <line x1="450" y1="292" x2="810" y2="420"/>
    <line x1="450" y1="292" x2="960" y2="420"/>
    <line x1="450" y1="292" x2="1160" y2="420"/>
  </g>
  <g stroke="#a78bfa" stroke-width="1">
    <line x1="0" y1="292" x2="900" y2="292" opacity="0">
      <animate attributeName="y1" values="292;420" dur="4s" calcMode="spline" keySplines="0.5 0 1 0.5" repeatCount="indefinite"/>
      <animate attributeName="y2" values="292;420" dur="4s" calcMode="spline" keySplines="0.5 0 1 0.5" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.6" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="292" x2="900" y2="292" opacity="0">
      <animate attributeName="y1" values="292;420" dur="4s" begin="-1s" calcMode="spline" keySplines="0.5 0 1 0.5" repeatCount="indefinite"/>
      <animate attributeName="y2" values="292;420" dur="4s" begin="-1s" calcMode="spline" keySplines="0.5 0 1 0.5" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.6" dur="4s" begin="-1s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="292" x2="900" y2="292" opacity="0">
      <animate attributeName="y1" values="292;420" dur="4s" begin="-2s" calcMode="spline" keySplines="0.5 0 1 0.5" repeatCount="indefinite"/>
      <animate attributeName="y2" values="292;420" dur="4s" begin="-2s" calcMode="spline" keySplines="0.5 0 1 0.5" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.6" dur="4s" begin="-2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="292" x2="900" y2="292" opacity="0">
      <animate attributeName="y1" values="292;420" dur="4s" begin="-3s" calcMode="spline" keySplines="0.5 0 1 0.5" repeatCount="indefinite"/>
      <animate attributeName="y2" values="292;420" dur="4s" begin="-3s" calcMode="spline" keySplines="0.5 0 1 0.5" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.6" dur="4s" begin="-3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- greeting -->
  <text x="450" y="92" text-anchor="middle" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="13" letter-spacing="6" fill="#6b7280" opacity="0">
    ✦ HELLO, TRAVELER ✦
    <animate attributeName="opacity" values="0;0.9" begin="0.2s" dur="0.8s" fill="freeze"/>
  </text>

  <!-- name: glow layer, glitch layers, main -->
  <text x="450" y="165" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="3" textLength="620" lengthAdjust="spacingAndGlyphs" fill="url(#nameGrad)" filter="url(#blurBig)" opacity="0.55">TATHAGAT MAITRAY</text>
  <text x="448" y="164" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="3" textLength="620" lengthAdjust="spacingAndGlyphs" fill="#22d3ee" opacity="0">TATHAGAT MAITRAY
    <animate attributeName="opacity" calcMode="discrete" values="0;0;0.7;0;0;0.5;0;0" keyTimes="0;0.42;0.44;0.47;0.74;0.76;0.79;1" dur="5.5s" repeatCount="indefinite"/>
  </text>
  <text x="453" y="166" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="3" textLength="620" lengthAdjust="spacingAndGlyphs" fill="#f472b6" opacity="0">TATHAGAT MAITRAY
    <animate attributeName="opacity" calcMode="discrete" values="0;0;0.7;0;0;0.5;0;0" keyTimes="0;0.43;0.45;0.48;0.75;0.77;0.8;1" dur="5.5s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="165" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="3" textLength="620" lengthAdjust="spacingAndGlyphs" fill="url(#nameGrad)">TATHAGAT MAITRAY</text>

  <!-- typed tagline -->
  <g mask="url(#typeMask)">
    <text x="264" y="210" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="20" letter-spacing="8" fill="#e5e7eb">CONTROL IS ILLUSION</text>
  </g>
  <rect x="264" y="190" width="12" height="24" fill="#22d3ee">
    <animate attributeName="x" calcMode="discrete" values="264;284;304;324;344;364;384;404;424;444;464;484;504;524;544;564;584;604;624;649" begin="1.2s" dur="2s" fill="freeze"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- rotating ships line -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="3.4s" dur="0.6s" fill="freeze"/>
    <text x="368" y="252" text-anchor="end" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="14" fill="#6b7280">&gt; ships:</text>
    <g font-family="Menlo, Consolas, 'Courier New', monospace" font-size="14" font-weight="bold" fill="#22d3ee">
      <text x="384" y="252" opacity="0">MCP SERVERS FOR AI AGENTS
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.16;0.19;1" dur="15s" repeatCount="indefinite"/>
      </text>
      <text x="384" y="252" opacity="0">AUDIO ENGINES THAT TALK TO CLAUDE
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.22;0.36;0.39;1" dur="15s" repeatCount="indefinite"/>
      </text>
      <text x="384" y="252" opacity="0">FIGMA → CODE TOOLING
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.4;0.42;0.56;0.59;1" dur="15s" repeatCount="indefinite"/>
      </text>
      <text x="384" y="252" opacity="0">SHARED CACHES FOR AGENT SWARMS
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.6;0.62;0.76;0.79;1" dur="15s" repeatCount="indefinite"/>
      </text>
      <text x="384" y="252" opacity="0">MACOS APPS NOBODY ASKED FOR
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.8;0.82;0.96;0.99;1" dur="15s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>
</svg>
